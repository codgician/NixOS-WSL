name: Validate Tarball

on:
  workflow_call: {}

jobs:
  validate:
    name: Validate Tarball 🩺 (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            filename: nixos.wsl
          - arch: aarch64
            filename: nixos-arm64.wsl
    steps:
      - name: Checkout WSL Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: microsoft/WSL
          ref: 2.6.3

      - name: Install dependencies 📦
        shell: bash
        run: |
          pip3 install -r distributions/requirements.txt

      - name: Download Tarball 📥
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: tarball-${{ matrix.arch }}

      - name: Validate Tarball 🩺
        shell: bash
        run: |
          python3 distributions/validate-modern.py --tar ${{ matrix.filename }}
